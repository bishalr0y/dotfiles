command_timeout = 2000

[buf]
disabled = true

[directory]
truncate_to_repo = false

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[nodejs]
# Only show Node for actual Node projects. This avoids unnecessary `node
# --version` calls in repos that just happen to contain JS/TS files.
detect_extensions = []
detect_files = ["package.json", ".node-version", ".nvmrc", ".tool-versions"]
detect_folders = ["node_modules"]

[package]
disabled = true
