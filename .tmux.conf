# Basics
set -s escape-time 0                     # vim mode switching, no lag
set -g history-limit 50000               # bigger scrollback
set -g display-time 4000                 # keep messages up longer
set -g status-interval 5                 # refresh status bar faster
set -g default-terminal "tmux-256color"  # proper term
set -g focus-events on                   # focus events where supported
setw -g aggressive-resize on             # resize panes aggressively

# Extended keys (Shift+Enter, Ctrl+Shift+key, etc.)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Shell
if-shell "test -f /opt/homebrew/bin/fish" "set-option -g default-shell /opt/homebrew/bin/fish" "set-option -g default-shell /usr/local/bin/fish"

# Prefix
unbind C-b
set -g prefix C-\;

# Mouse
set -g mouse on

# Pane resizing

bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

bind -r DC select-layout tiled          # equalize all panes

# Splits
# vertical
unbind %
bind | split-window -h
# horizontal
unbind '"'
bind - split-window -v

# Indexing
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows 1

# Pane actions
bind x kill-pane
unbind z
unbind m
bind m resize-pane -Z

# Reload
unbind r
bind r source-file ~/.tmux.conf

# Copy mode (vi)
set-window-option -g mode-keys vi
bind v copy-mode

bind -T copy-mode-vi q send-keys -X cancel
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi Escape send-keys -X clear-selection
bind -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"

# New windows/splits in cwd
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"

# Status bar
set -g status-position bottom

# Theme
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=blue,bold] #S #[bg=default] "
set -g status-right "#[fg=blue]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#{pane_current_path} "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
setw -g clock-mode-colour blue

# Plugins
set -g @plugin 'tmux-plugins/tpm'

# Ctrl+h/j/k/l to navigate between nvim and tmux panes seamlessly
set -g @plugin 'christoomey/vim-tmux-navigator'

# TPM
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

run '~/.config/tmux/plugins/tpm/tpm'
