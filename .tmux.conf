# Basics
set -s escape-time 0                     # vim mode switching, no lag
set -g history-limit 50000               # bigger scrollback
set -g display-time 4000                 # keep messages up longer
set -g status-interval 5                 # refresh status bar faster
set -g default-terminal "tmux-256color"  # proper term
set -g focus-events on                   # focus events where supported
setw -g aggressive-resize on             # resize panes aggressively

# Extended keys (Shift+Enter, Ctrl+Shift+key, etc.)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Prefix
unbind C-b
set -g prefix C-\;

# Mouse
set -g mouse on

# Pane resizing
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

bind -r DC select-layout tiled          # equalize all panes

# Splits
unbind %
bind | split-window -h
unbind '"'
bind - split-window -v

# Indexing
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows 1

# Pane actions
bind x kill-pane
unbind z
unbind m
bind m resize-pane -Z

# Reload
unbind r
bind r source-file ~/.tmux.conf

# Copy mode (vi)
set-window-option -g mode-keys vi
bind v copy-mode

bind -T copy-mode-vi q send-keys -X cancel
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi Escape send-keys -X clear-selection
bind -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"

# New windows/splits in cwd
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"

# Status bar
set -g status-position top

# Plugins
set -g @plugin 'tmux-plugins/tpm'

# Ctrl+h/j/k/l to navigate between nvim and tmux panes seamlessly
set -g @plugin 'christoomey/vim-tmux-navigator'

# Catppuccin theme
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style 'basic'
set -g @catppuccin_status_background 'none'
set -g @catppuccin_window_text ' #W#{?window_zoomed_flag, ,}'
set -g @catppuccin_window_current_text ' #W#{?window_zoomed_flag, ,}'

set -g status-left ""
set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_session}"

# TPM
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

run '~/.config/tmux/plugins/tpm/tpm'
