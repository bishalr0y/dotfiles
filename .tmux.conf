# Reload tmux config with prefix + r
unbind r
bind r source-file ~/.tmux.conf

# Bind <C-;> as the prefix key 
set -g prefix C-\;

# Enable mouse support (click to select pane, scroll, etc.)
set -g mouse on

# Allows Shift+Enter, Ctrl+Shift+<key>, etc. to work correctly in apps
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Resize panes using vim-style keys (Ctrl + h/j/k/l)
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Split panes with | and -
unbind %
bind | split-window -h   # Horizontal split with |
unbind '"'
bind - split-window -v   # Vertical split with -

# Start window and pane numbers at 1 instead of 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# Renumber windows automatically when one is closed
set-option -g renumber-windows 1

# Bind 'x' to kill the current pane
bind x kill-pane

# Maximize/minimize the current pane with 'm'
unbind z
unbind m
bind m resize-pane -Z

# Use vi keybindings in copy mode
set-window-option -g mode-keys vi

# Start text selection in copy mode with 'v'
bind-key -T copy-mode-vi 'v' send -X begin-selection

# Copy selected text with 'y'
bind-key -T copy-mode-vi 'y' send -X copy-selection

# Move between panes using vim-style keys
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Open new windows and splits in the same directory
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""
set -gw automatic-rename on
set -gw automatic-rename-format '#{b:pane_current_command}'

# Theme
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=green,bold] #S #[bg=default] "
set -g status-right "#[fg=blue]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#{b:pane_current_path} "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
setw -g clock-mode-colour blue

