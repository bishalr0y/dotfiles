# Reload tmux config with prefix + r
unbind r
bind r source-file ~/.tmux.conf

# Set shell to fish (tmux session default, not system default)
if-shell "test -f /opt/homebrew/bin/fish" "set-option -g default-shell /opt/homebrew/bin/fish" "set-option -g default-shell /usr/local/bin/fish"

# Bind <C-;> as the prefix key 
set -g prefix C-\;

# Enable mouse support (click to select pane, scroll, etc.)
set -g mouse on

# Allows Shift+Enter, Ctrl+Shift+<key>, etc. to work correctly in apps
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Resize panes using prefix + h/j/k/l
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

# Split panes with | and -
unbind %
bind | split-window -h   # Horizontal split with |
unbind '"'
bind - split-window -v   # Vertical split with -

# Start window and pane numbers at 1 instead of 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# Renumber windows automatically when one is closed
set-option -g renumber-windows 1

# Bind 'x' to kill the current pane
bind x kill-pane

# Maximize/minimize the current pane with 'm'
unbind z
unbind m
bind m resize-pane -Z

# Use vi keybindings in copy mode
set-window-option -g mode-keys vi

# Start text selection in copy mode with 'v'
bind-key -T copy-mode-vi 'v' send -X begin-selection

# Copy selected text with 'y'
bind-key -T copy-mode-vi 'y' send -X copy-selection

# Smart pane switching with awareness of nvim splits
# If nvim is running in the current pane, pass keys through so nvim can
# navigate its own splits first, then switch tmux panes when at the edge.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Also allow navigation in copy-mode
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

# Open new windows and splits in the same directory
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"

# Plugin list
set -g @plugin 'tmux-plugins/tpm'               # Tmux Plugin Manager
set -g @plugin 'tmux-plugins/tmux-sensible'     # Sensible default settings

# Catppuccin theme
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style 'basic'
set -g @catppuccin_status_background 'none'

# Show window name instead of pane title
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'

# Status modules (same data as before: directory + session)
set -g status-left ""
set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_session}"

# Session persistence - save and restore tmux sessions
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-vim 'session'      # Restore vim sessions
set -g @resurrect-strategy-nvim 'session'     # Restore neovim sessions
set -g @resurrect-capture-pane-contents 'on'  # Save pane contents

# Automatic session save/restore
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'         # Auto-restore last saved session
set -g @continuum-boot 'on'            # Auto-start tmux on boot
set -g @continuum-save-interval '10'   # Save every 10 minutes

# Move status bar to top
set -g status-position top

# Set custom plugin directory
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

# Auto-install TPM if not present
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM
run '~/.config/tmux/plugins/tpm/tpm'
